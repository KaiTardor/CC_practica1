apiVersion: apps/v1
kind: Deployment
metadata:
  name: owncloud
  namespace: practice1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: owncloud
  template:
    metadata:
      labels:
        app: owncloud
    spec:
      containers:
        - name: owncloud
          image: owncloud/server:10.15.3
          env:
            - name: OWNCLOUD_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: practice1-config
                  key: OWNCLOUD_DOMAIN
            - name: OWNCLOUD_DB_TYPE
              value: mysql
            - name: OWNCLOUD_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: practice1-config
                  key: MARIADB_DATABASE
            - name: OWNCLOUD_DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: practice1-config
                  key: MARIADB_USER
            - name: OWNCLOUD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: practice1-secret
                  key: MARIADB_PASSWORD
            - name: OWNCLOUD_DB_HOST
              value: mariadb
            - name: OWNCLOUD_ADMIN_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: practice1-config
                  key: OWNCLOUD_ADMIN_USERNAME
            - name: OWNCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: practice1-secret
                  key: OWNCLOUD_ADMIN_PASSWORD
            - name: OWNCLOUD_REDIS_ENABLED
              value: "true"
            - name: OWNCLOUD_REDIS_HOST
              value: redis
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: owncloud
  namespace: practice1
spec:
  type: NodePort
  selector:
    app: owncloud
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30170
